version: "3.9"
services:
  cdn:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - cdn_uploads:/app/uploads
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - BASE_URL=${BASE_URL:-http://localhost:3001}
      - PORT=3001
      - UPLOADS_DIR=/app/uploads
    restart: unless-stopped

volumes:
  cdn_uploads:
